syntax = "proto3";

package tdbin.bench;

message BenchDocument {
  string id = 1;
  string title = 2;
  int64 revision = 3;
  repeated BenchNode nodes = 4;
  repeated BenchEdge edges = 5;
  repeated BenchStyle styles = 6;
  repeated BenchMeta metadata = 7;
}

message BenchNode {
  string id = 1;
  string label = 2;
  double x = 3;
  double y = 4;
  double width = 5;
  double height = 6;
  bool selected = 7;
  bool locked = 8;
  repeated string tags = 9;
}

message BenchEdge {
  string id = 1;
  string from = 2;
  string to = 3;
  optional string label = 4;
  double weight = 5;
  bool directed = 6;
}

message BenchStyle {
  string selector = 1;
  string fill = 2;
  string stroke = 3;
  double stroke_width = 4;
  bool rounded = 5;
}

message BenchMeta {
  string key = 1;
  string value = 2;
}

message BenchEvent {
  oneof kind {
    BenchNodeCreated node_created = 1;
    BenchNodeMoved node_moved = 2;
    BenchEdgeAdded edge_added = 3;
    BenchSelectionChanged selection_changed = 4;
    BenchViewChanged view_changed = 5;
    BenchHeartbeat heartbeat = 6;
  }
}

message BenchHeartbeat {}

message BenchNodeCreated {
  string document_id = 1;
  BenchNode node = 2;
}

message BenchNodeMoved {
  string document_id = 1;
  string node_id = 2;
  double x = 3;
  double y = 4;
}

message BenchEdgeAdded {
  string document_id = 1;
  BenchEdge edge = 2;
}

message BenchSelectionChanged {
  string document_id = 1;
  repeated string node_ids = 2;
  repeated string edge_ids = 3;
}

message BenchViewChanged {
  string document_id = 1;
  double zoom = 2;
  double offset_x = 3;
  double offset_y = 4;
}

message BenchMetricBatch {
  string batch_id = 1;
  int64 started_at_epoch_ms = 2;
  repeated int64 sample_ids = 3;
  repeated bool valid = 4;
  repeated double latency_ms = 5;
  repeated bytes payloads = 6;
  repeated BenchMetricColumn columns = 7;
}

message BenchMetricColumn {
  string name = 1;
  repeated double values = 2;
}
