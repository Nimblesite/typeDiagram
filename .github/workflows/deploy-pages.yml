# agent-pmo:372ce7f
name: Deploy to GitHub Pages

on:
  # Deploys automatically after a successful Release run, and can also be
  # triggered manually. Never on push to main (website must not get ahead
  # of the actual release). See REPO-STANDARDS-SPEC [CI-WORKFLOWS].
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Only run on successful Release, or when triggered manually.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # [SWR-REL-WORKFLOW] Deploy the website at the RELEASE ref, not main. A
      # workflow_run event checks out the default branch by default, which would
      # publish whatever landed on main after the tag; head_sha is the exact commit
      # the Release run built (the tagged SHA). On workflow_dispatch head_sha is
      # empty, so checkout falls back to the dispatched ref.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build framework
        run: npm run -w typediagram-core build

      - name: Build web playground
        run: npm run -w @typediagram/web build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
