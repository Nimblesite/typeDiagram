# agent-pmo:372ce7f
name: Deploy to GitHub Pages

on:
  # Manual only. This job has Pages write privileges, so it must not checkout a
  # ref derived from a workflow_run payload. Trigger after a green Release when
  # publishing the website for that release. See REPO-STANDARDS-SPEC
  # [CI-WORKFLOWS].
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # [SWR-REL-WORKFLOW] workflow_dispatch checks out the operator-selected
      # trusted ref. Do not reintroduce workflow_run + head_sha checkout here:
      # Pages deployment has write privileges.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build framework
        run: npm run -w typediagram-core build

      - name: Build web playground
        run: npm run -w @typediagram/web build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
